<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love</title>

<style>
body {
  text-align: center;
  background: pink;
  margin-top: 120px;
  font-family: Arial;
}

h1 {
  font-size: 40px;
}

button {
  padding: 15px 25px;
  font-size: 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

#no {
  position: absolute;
}
</style>
</head>

<body>

<h1>Do you love me? 🥺</h1>

<button onclick="playAndGo()">Yes 🩷</button>
<button id="no" onmouseover="move()">No</button>

<audio id="music">
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
function playAndGo() {
  let m = document.getElementById("music");
  m.play().catch(()=>{});
  setTimeout(() => {
    window.location.href = "love.html";
  }, 1000);
}

function move() {
  let b = document.getElementById("no");
  b.style.left = Math.random()*300 + "px";
  b.style.top = Math.random()*300 + "px";
}
</script>

</body>
</html>
